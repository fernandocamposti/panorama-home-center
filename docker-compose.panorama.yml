# Stack do Panorama, isolado do Whaticket/Ticketz.
# Nomes de container, rede e volumes com prefixo "panorama_" de propósito,
# para nunca colidir com o que o Ticketz já usa nesta VPS.
#
# Este VPS usa nginx-proxy + acme-companion (containers) para expor tudo ao
# público e emitir SSL automaticamente — não há Nginx instalado direto no
# host. Por isso o panorama_api entra na MESMA rede Docker que esses dois
# containers (ticketz-docker-acme_nginx-proxy) e usa as variáveis de
# ambiente VIRTUAL_HOST / LETSENCRYPT_HOST, que eles leem automaticamente
# via socket do Docker. Não é preciso editar nenhuma config de Nginx à mão
# nem rodar certbot — o acme-companion faz isso sozinho ao ver essas envs.

version: "3.9"

services:
  panorama_postgres:
    image: postgres:16
    container_name: panorama_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: panorama
      POSTGRES_PASSWORD: TROQUE_ESTA_SENHA
      POSTGRES_DB: panorama
    volumes:
      - panorama_pg_data:/var/lib/postgresql/data
    networks:
      - panorama_net
    # Não publicar porta no host — só a própria API do Panorama acessa,
    # via rede interna do Docker (panorama_net).

  panorama_redis:
    image: redis:7-alpine
    container_name: panorama_redis
    restart: unless-stopped
    networks:
      - panorama_net

  panorama_api:
    build: ./api          # pasta com o backend Node.js (Fastify) do Panorama
    container_name: panorama_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://panorama:TROQUE_ESTA_SENHA@panorama_postgres:5432/panorama
      REDIS_URL: redis://panorama_redis:6379
      NODE_ENV: production
      # Lidos automaticamente pelo nginx-proxy / acme-companion já em uso:
      VIRTUAL_HOST: painel.panoramahc.com.br
      VIRTUAL_PORT: "3000"
      LETSENCRYPT_HOST: painel.panoramahc.com.br
      LETSENCRYPT_EMAIL: jarie@grupoepanorama.com.br
    depends_on:
      - panorama_postgres
      - panorama_redis
    networks:
      - panorama_net
      - nginx_proxy_net   # para o nginx-proxy do Ticketz conseguir alcançar este container

  # panorama_frontend:
  #   Descomentar quando o frontend React (Fase 3 do roadmap) estiver pronto.
  #   Até lá, subir só postgres + redis + api não dá erro nem falta nada.
  #   Quando existir, provavelmente vai precisar de um subdomínio próprio
  #   (ex.: app.grupoepanorama.com.br) com seu próprio VIRTUAL_HOST/LETSENCRYPT_HOST,
  #   já que o painel.panoramahc.com.br desta API ficará ocupado pela API.
  #   build: ./frontend
  #   container_name: panorama_frontend
  #   restart: unless-stopped
  #   networks:
  #     - panorama_net
  #     - nginx_proxy_net

networks:
  panorama_net:
    name: panorama_net
  nginx_proxy_net:
    name: ticketz-docker-acme_nginx-proxy
    external: true

volumes:
  panorama_pg_data:
    name: panorama_pg_data
