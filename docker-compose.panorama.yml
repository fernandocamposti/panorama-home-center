# Stack do Panorama, isolado do Whaticket/Ticketz.
# Nomes de container, rede e volumes com prefixo "panorama_" de propósito,
# para nunca colidir com o que o Ticketz já usa nesta VPS.
#
# Este VPS usa nginx-proxy + acme-companion (containers) para expor tudo ao
# público e emitir SSL automaticamente — não há Nginx instalado direto no
# host. Só o panorama_frontend entra na rede desse proxy (ticketz-docker-acme_nginx-proxy)
# e usa VIRTUAL_HOST/LETSENCRYPT_HOST, lidos automaticamente por ele via socket
# do Docker. O panorama_api fica 100% isolado na rede interna (panorama_net) —
# o próprio Nginx do container do frontend é quem fala com ela e faz o proxy
# de /api e /health (ver frontend/nginx.conf).

version: "3.9"

services:
  panorama_postgres:
    image: postgres:16
    container_name: panorama_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: panorama
      POSTGRES_PASSWORD: 4f3db4a9d23e533261103b41d7a2bae4
      POSTGRES_DB: panorama
    volumes:
      - panorama_pg_data:/var/lib/postgresql/data
    networks:
      - panorama_net
    # Não publicar porta no host — só a própria API do Panorama acessa,
    # via rede interna do Docker (panorama_net).

  panorama_redis:
    image: redis:7-alpine
    container_name: panorama_redis
    restart: unless-stopped
    networks:
      - panorama_net

  panorama_api:
    build: ./api          # pasta com o backend Node.js (Fastify) do Panorama
    container_name: panorama_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://panorama:4f3db4a9d23e533261103b41d7a2bae4@panorama_postgres:5432/panorama
      REDIS_URL: redis://panorama_redis:6379
      NODE_ENV: production
    depends_on:
      - panorama_postgres
      - panorama_redis
    networks:
      - panorama_net
    # Sem "ports" e sem VIRTUAL_HOST — só é alcançável de dentro da panorama_net,
    # pelo container panorama_frontend (via seu Nginx interno).

  panorama_frontend:
    build: ./frontend
    container_name: panorama_frontend
    restart: unless-stopped
    environment:
      # Lidos automaticamente pelo nginx-proxy / acme-companion do Ticketz:
      VIRTUAL_HOST: painel.panoramahc.com.br
      VIRTUAL_PORT: "80"
      LETSENCRYPT_HOST: painel.panoramahc.com.br
      LETSENCRYPT_EMAIL: jarie@grupoepanorama.com.br
    depends_on:
      - panorama_api
    networks:
      - panorama_net       # para falar com panorama_api
      - nginx_proxy_net    # para o proxy do Ticketz conseguir alcançar este container
    volumes:
      # Serve o panorama-agent.exe (gerado por scripts/build-agent-exe.sh) em
      # https://painel.panoramahc.com.br/agente-download/panorama-agent.exe
      # — pasta local na VPS, não faz parte da imagem, então atualizar o
      # arquivo não exige rebuild do container.
      - ./agent-releases:/usr/share/nginx/html/agente-download:ro

networks:
  panorama_net:
    name: panorama_net
  nginx_proxy_net:
    name: ticketz-docker-acme_nginx-proxy
    external: true

volumes:
  panorama_pg_data:
    name: panorama_pg_data
