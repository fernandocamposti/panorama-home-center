# Nginx interno do container do frontend.
# Serve o build estático do React em "/" (com fallback de SPA) e proxeia
# "/api" e "/health" para o container panorama_api, via rede Docker interna
# (panorama_net) — por isso o panorama_api não precisa mais ficar exposto
# na rede do proxy do Ticketz; só este container fica.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://panorama_api:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://panorama_api:3000/health;
    }

    location /socket.io/ {
        proxy_pass http://panorama_api:3000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }
}
